version: '3.8'

services:
  mongo:
    image: mongo:6.0
    container_name: mazuri_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: mazuri-waste-management
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - mazuri_network

  backend:
    build: ./backend
    container_name: mazuri_backend
    restart: always
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:password@mongo:27017/mazuri-waste-management?authSource=admin
      PORT: 5000
      JWT_SECRET: your_jwt_secret_key_here_change_in_production
      JWT_EXPIRE: 7d
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    networks:
      - mazuri_network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: mazuri_frontend
    restart: always
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - mazuri_network
    volumes:
      - ./frontend:/app
      - /app/node_modules

networks:
  mazuri_network:
    driver: bridge

volumes:
  mongo_data:
